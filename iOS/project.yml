name: glasslog
options:
  bundleIdPrefix: com.shimondeitel
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    DEVELOPMENT_TEAM: W7Q885Q59C
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
targets:
  glasslog:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: App
    info:
      path: App/Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleDisplayName: Glass Log - Fusing Tracker
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fusingtracker
        PRODUCT_NAME: Glass Log - Fusing Tracker
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: true
    scheme:
      testTargets:
        - glasslogTests
        - glasslogUITests
  glasslogTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Tests
    dependencies:
      - target: glasslog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fusingtracker.tests
        GENERATE_INFOPLIST_FILE: true
  glasslogUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: UITests
    dependencies:
      - target: glasslog
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.fusingtracker.uitests
        GENERATE_INFOPLIST_FILE: true
